id: cavity-tnt

display:
  title: "&bCavity TNT"
  description:
    - "&7Hollow sphere blast"
    - "&7Leaves an air pocket"

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: true
  left_click_block: break
  right_click_block: ignite
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
    - FLINT
  sounds:
    place: BLOCK_BEACON_ACTIVATE
    ignite: ITEM_FLINTANDSTEEL_USE

custom_data:
  fuse: 80
  outerRadius: 8
  shellThickness: 2
  staggered: true
  batchSize: 24
  batchDelayTicks: 2

# =============================================================================
# Spider Storm TNT — spawns a swarm of spiders on detonation
# =============================================================================
#
# Can suppress the vanilla explosion and rely on entityPayload instead.

id: spider-storm-tnt

display:
  title: "&5Spider Storm TNT"
  description:
    - "&dUnleashes a swarm of spiders on detonation."
    - "&7Spiders spread around the impact and attack nearby players."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 35
    hit_interval_ticks: 5
    hit_sound: BLOCK_STONE_HIT
    break_sound: BLOCK_STONE_BREAK
    tool_ticks:
      _PICKAXE: 18
      _AXE: 24
      _SHOVEL: 24

textures:
  top: top.png
  side: side.png
  bottom: bottom.png

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: true
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
    - FLINT
  sounds:
    place: ENTITY_SPIDER_AMBIENT
    ignite: ITEM_FLINTANDSTEEL_USE

# realExplosion — false = particle burst only; entities come from entityPayload
# multiplier    — scales resolved power for spread distance and spider aggression
# entityPayload.type          — Bukkit entity type name
# entityPayload.count         — how many to spawn
# entityPayload.behavior      — extension-specific AI hint (aggressive)
# entityPayload.targetPlayers — whether spiders acquire nearby player targets
custom_data:
  fuse: 80
  radius: 10.0
  multiplier: 2.0
  realExplosion: false
  fire: false
  blockDamage: false
  entityPayload:
    type: SPIDER
    count: 40
    behavior: aggressive
    targetPlayers: true

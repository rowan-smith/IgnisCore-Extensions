# =============================================================================
# Quarry Cache — collects nearby block drops into internal storage
# =============================================================================
#
# Sections:
#   display     — name and lore on the block item
#   block       — placement, mining, tool-specific break speeds
#   textures    — face images
#   model       — authoring metadata only
#   behavior    — left-click break, right-click open GUI
#   custom_data — collection radius and debug visuals

id: quarry-cache

display:
  title: "&b&lQuarry Cache"
  description:
    - "&r&r&7&eVacuums&7 nearby block drops into storage."
    - "&r&r&7Right-click to &eopen&7 the collection GUI."
    - "&r&r&e8-block&7 pickup radius while placed."

# block.breaking.tool_ticks.<SUFFIX> — faster mining when tool material ends with suffix
#   e.g. _PICKAXE matches wooden_pickaxe, iron_pickaxe, …
block:
  placeable: true
  breakable: true
  breaking:
    ticks: 35
    hit_interval_ticks: 5
    hit_sound: BLOCK_STONE_HIT
    break_sound: BLOCK_STONE_BREAK
    tool_ticks:
      _PICKAXE: 18
      _AXE: 24
      _SHOVEL: 24

textures:
  top: top.jpg
  side: side.jpg
  bottom: bottom.jpg
  fallback: ender_chest

model:
  type: "block_display"
  mode: "auto"

# right_click_block: open — core calls strategy onPlacedInteract with OPEN
behavior:
  combustible: false
  sounds:
    place: BLOCK_CHEST_PLACE

# collectRadius / collectDepth — horizontal radius and vertical depth for drop collection
# showCollectZone — spawn particles outlining the collection area
custom_data:
  collectRadius: 5.0
  collectDepth: 5.0
  showCollectZone: true

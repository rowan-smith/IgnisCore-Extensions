id: mood-lantern

display:
  title: "&6Mood Lantern"
  description:
    - "&7Reads nearby mob and player mood in &f10-block&7 radius."
    - "&7Angry particles if hostiles dominate."
    - "&7Note or &bend-rod&7 particles when calm."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png

model:
  type: "block_display"
  mode: "auto"


behavior:
  sounds:
    place: BLOCK_AMETHYST_BLOCK_CHIME
custom_data:
  moodParticles: 3
  moodRadius: 10.0
  tickPeriod: 25

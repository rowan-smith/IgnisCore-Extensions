# =============================================================================
# Detonator — links to and detonates signal-charge blocks
# =============================================================================

id: detonator

display:
  title: "&eDetonator"
  description:
    - "&7Left-click a &esignal charge&7 to link it."
    - "&7&eRight-click&7 to detonate all linked charges."
    - "&7Holds up to &e16&7 paired charges."

item:
  base_material: blaze_rod

textures:
  icon: icon.png

# Item behavior action tokens (interpreted by detonator Strategy):
#   assign   — left_click_block: link clicked custom block to this detonator
#   detonate — right_click_air / right_click_block: trigger all linked charges
#   none     — ignore that interaction
behavior:
  left_click_block: assign
  right_click_air: detonate
  right_click_block: detonate

# target_block — config id of the block type that can be linked (signal-charge)
# target_blocks — list of block ids for multi-type detonators
# max_links    — maximum simultaneous links stored on the item
custom_data:
  target_block: signal-charge
  target_blocks:
    - signal-charge
    - remote-c4
    - timed-charge
    - scare-charge
  max_links: 16

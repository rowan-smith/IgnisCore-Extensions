# =============================================================================
# Mimic TNT — spawns decoy primed TNT; only one is real
# =============================================================================
#
# On ignite, multiple TNT entities scatter from the block. One carries the
# real blast power; the rest are harmless fakes.

id: mimic-tnt

display:
  title: "&d&lMimic TNT"
  description:
    - "&r&r&7One of them is real. The rest only &dpretend&7."
    - "&r&r&7Good luck guessing which is which."
    - "&r&r&7Deception scatters in every direction."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png
  fallback: minecraft:tnt

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: true
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
    - FLINT
  sounds:
    place: BLOCK_BEACON_ACTIVATE
    ignite: ITEM_FLINTANDSTEEL_USE

# mimicCount              — number of fake TNT entities (plus one real)
# mimicHorizontalPower    — scatter velocity on X/Z
# mimicVerticalPower      — upward scatter velocity
custom_data:
  fuse: 80
  radius: 4.0
  power: 4.0
  fire: false
  blockDamage: true
  mimicCount: 8
  mimicHorizontalPower: 1.0
  mimicVerticalPower: 0.5

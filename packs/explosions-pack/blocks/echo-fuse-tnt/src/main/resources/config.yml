id: echo-fuse-tnt

display:
  title: "&cEcho Fuse TNT"
  description:
    - "&7Place and ignite with &fflint and steel&7 or &6fire charge&7."
    - "&7Fuses for &e4.0s&7, then echoes with phantom aftershocks."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png

model:
  type: "block_display"
  mode: "auto"


behavior:
  combustible: true
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
  sounds:
    place: BLOCK_TNT_PLACE
    ignite: ITEM_FLINTANDSTEEL_USE
custom_data:
  echoBursts: 3
  echoDelay: 10
  fuse: 80
  power: 4.0
  tickInterval: 5

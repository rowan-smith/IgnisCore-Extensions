# =============================================================================
# Wormhole TNT — pulls entities inward, then detonates outward
# =============================================================================
#
# After ignition, nearby entities are drawn toward the block. Blocks may be
# ripped into the void based on wormholeRip* settings before the final blast.

id: wormhole-tnt

display:
  title: "&cWormhole TNT"
  description:
    - "&7pulls entities inward, then detonates outward."
    - "&7Place and ignite with flint & steel or fire charge."
    - "&7Fuses for &e5.0s&7, then pulls matter inward before erupting."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: true
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
    - FLINT
  sounds:
    place: BLOCK_BEACON_ACTIVATE
    ignite: ITEM_FLINTANDSTEEL_USE

# Standard explosion keys: fuse, radius, power, fire, blockDamage
# wormholeRipRadius      — cube radius for block erosion during fuse
# wormholeRipStartTicks  — fuse ticks remaining when ripping begins
# wormholeRipChance      — per-block probability each rip pass (0.0–1.0)
custom_data:
  fuse: 100
  radius: 12.0
  power: 10.0
  fire: false
  blockDamage: true
  wormholeRipRadius: 4
  wormholeRipStartTicks: 60
  wormholeRipChance: 0.05

id: doppelganger-block

display:
  title: "&d&lDoppelgänger Block"
  description:
    - "&r&r&7It looks like an ordinary &fstone block&7."
    - "&r&r&7But it is most certainly &dnot&7."
    - "&r&r&7Trust nothing that wears another's face."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png
  fallback: minecraft:bedrock

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: true
  left_click_block: break
  right_click_block: ignite
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
  sounds:
    place: BLOCK_STONE_PLACE
    ignite: ITEM_FLINTANDSTEEL_USE

custom_data:
  fuse: 0
  power: 4.0
  fire: false
  blockDamage: true

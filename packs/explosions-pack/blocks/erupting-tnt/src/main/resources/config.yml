# =============================================================================
# Erupting TNT — launches primed TNT during the fuse, then explodes
# =============================================================================

id: erupting-tnt

display:
  title: "Erupting TNT"
  description:
    - "&4Complete"
    - "&4Destruction"

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: true
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
    - FLINT
  sounds:
    place: BLOCK_BEACON_ACTIVATE
    ignite: ITEM_FLINTANDSTEEL_USE

# eruptionInterval          — ticks between spawned primed TNT during fuse
# eruptionFuse              — fuse ticks on each spawned primed TNT
# eruptionHorizontalPower   — random horizontal launch velocity
# eruptionVerticalPower     — upward launch velocity
custom_data:
  fuse: 100
  radius: 5.0
  power: 5.0
  fire: true
  blockDamage: true
  eruptionInterval: 10
  eruptionFuse: 80
  eruptionHorizontalPower: 0.4
  eruptionVerticalPower: 1.2

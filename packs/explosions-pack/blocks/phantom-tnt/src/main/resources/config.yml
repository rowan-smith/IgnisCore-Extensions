# =============================================================================
# Phantom TNT — becomes invisible shortly before detonation
# =============================================================================
#
# Standard combustible TNT with a long fuse. The display entity is removed
# near the end of the countdown so the explosion appears to come from nowhere.

id: phantom-tnt

display:
  title: "&d&lPhantom TNT"
  description:
    - "&r&r&7Now you see it. &dSoon&7 you won't."
    - "&r&r&7The blast seems to come from nowhere."
    - "&r&r&7You'll never spot where it went."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png
  fallback: tnt

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: true
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
    - FLINT
  sounds:
    place: BLOCK_BEACON_ACTIVATE
    ignite: ITEM_FLINTANDSTEEL_USE

custom_data:
  fuse: 160
  radius: 6.0
  power: 4.0
  fire: false
  blockDamage: true

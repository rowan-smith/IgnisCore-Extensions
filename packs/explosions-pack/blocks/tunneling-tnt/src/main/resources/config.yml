# =============================================================================
# Tunneling TNT — chained explosions in a straight line
# =============================================================================
#
# Detonation direction follows the igniting player's look vector. Explosions
# step forward along that line instead of a single centered blast.

id: tunneling-tnt

display:
  title: "&cTunneling TNT"
  description:
    - "&7chained explosions in a straight line."
    - "&7Place and ignite with flint & steel or fire charge."
    - "&7Fuses for &e3.0s&7, then bores a tunnel along your aim."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: true
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
    - FLINT
  sounds:
    place: BLOCK_BEACON_ACTIVATE
    ignite: ITEM_FLINTANDSTEEL_USE

# tunnelLength — number of explosions along the tunnel
# tunnelGap    — blocks between each explosion step
custom_data:
  fuse: 60
  radius: 4.0
  power: 4.0
  fire: false
  blockDamage: true
  tunnelLength: 16
  tunnelGap: 2.0

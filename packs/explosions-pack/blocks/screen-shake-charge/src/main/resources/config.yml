id: screen-shake-charge

display:
  title: "&cScreen Shake Charge"
  description:
    - "&7Place and ignite with &fflint and steel&7 or &6fire charge&7."
    - "&7Fuses for &e2.0s&7, then violently rattles nearby screens."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png
  fallback: tnt

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: true
  left_click_block: break
  right_click_block: ignite
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
  sounds:
    place: BLOCK_TNT_PLACE
    ignite: ITEM_FLINTANDSTEEL_USE

custom_data:
  fuse: 40
  power: 4.0
  fire: false
  blockDamage: true

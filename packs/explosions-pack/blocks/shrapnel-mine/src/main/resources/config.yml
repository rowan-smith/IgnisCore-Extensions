id: shrapnel-mine

display:
  title: "&cShrapnel Mine"
  description:
    - "&7Bury it to arm a proximity mine."
    - "&7Sprays deadly shrapnel."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: false
  left_click_block: break
  right_click_block: none
  sounds:
    place: BLOCK_GRASS_PLACE

custom_data:
  fuse: 0
  buried: true
  triggerRadius: 1.2
  scanRadius: 5
  projectileCount: 48
  minVelocity: 0.55
  maxVelocity: 1.35

id: invisiwall

display:
  title: "&6Invisiwall"
  description:
    - "&7Place and ignite with flint & steel or fire charge."
    - "&7Fuses for &e0.5s&7, then raises then shatters a hidden barrier."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: true
  left_click_block: break
  right_click_block: ignite
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
  sounds:
    place: BLOCK_STONE_PLACE
    ignite: ITEM_FLINTANDSTEEL_USE

custom_data:
  fuse: 0
  power: 4.0
  fire: false
  blockDamage: true

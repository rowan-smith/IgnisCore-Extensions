id: ring-tnt

display:
  title: "&cRing TNT"
  description:
    - "&7Place and ignite with &fflint and steel&7 or &6fire charge&7."
    - "&7Fuses for &e3.5s&7, then carves a ring-shaped cavity."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.png
  side: side.png
  bottom: bottom.png
  fallback: tnt

model:
  type: "block_display"
  mode: "auto"

behavior:
  combustible: true
  left_click_block: break
  right_click_block: ignite
  ignition_materials:
    - FLINT_AND_STEEL
    - FIRE_CHARGE
    - FLINT
  sounds:
    place: BLOCK_BEACON_ACTIVATE
    ignite: ITEM_FLINTANDSTEEL_USE

custom_data:
  fuse: 70
  majorRadius: 7
  minorRadius: 3
  staggered: true
  batchSize: 16
  batchDelayTicks: 2

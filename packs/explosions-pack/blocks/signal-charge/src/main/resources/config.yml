# =============================================================================
# Signal Charge — remote-detonated charge (pair with detonator item)
# =============================================================================
#
# Not ignited with flint and steel. Linked via detonator left-click, detonated
# via detonator right-click. Surface clicks on the placed block are disabled.

id: signal-charge

display:
  title: "&6&lSignal Charge"
  description:
    - "&r&r&7Place it, then link a &edetonator&7."
    - "&r&r&7Cannot be lit with &fflint and steel&7."
    - "&r&r&7&eRight-click&7 the &fdetonator&7 to blow it remotely."

block:
  placeable: true
  breakable: true
  breaking:
    ticks: 0
    break_sound: BLOCK_GRAVEL_BREAK
    hit_sound: BLOCK_GRAVEL_HIT

textures:
  top: top.jpg
  side: side.jpg
  bottom: bottom.jpg
  fallback: minecraft:redstone_block

model:
  type: "block_display"
  mode: "auto"

# combustible: false — no flint-and-steel ignition; detonator handles triggering
behavior:
  combustible: false
  sounds:
    place: BLOCK_TNT_PLACE

# fuse: 0 — instant trigger when detonated (no visible countdown on the charge itself)
custom_data:
  fuse: 0
  radius: 6.0
  power: 6.0
  fire: false
  blockDamage: true
